<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BC Family Vehicle Browser{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      🚗 <span>BC Family Vehicle</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">All Vehicles</a>
      <a href="/compare" class="nav-link {% if request.path == '/compare' %}active{% endif %}">Compare</a>
    </div>
  </div>
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <div class="footer-inner">
    <span>BC Family Vehicle Browser · April 2026 · Data from AutoTrader.ca, CarGurus.ca</span>
    <span>Scores reflect importance weights — adjust on the main page to re-rank</span>
  </div>
</footer>

</body>
</html>
